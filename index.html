// ─── 9. NOTIFICATIONS ───────────────────────────────────────────
const Notify = {
  show(opts) {
    const container = document.getElementById('notifications');
    const el = document.createElement('div');
    el.className = 'notif';
    el.innerHTML = `
      <div class="notif-icon">
        <svg viewBox="0 0 32 32" fill="none" stroke="var(--os-accent)" stroke-width="2">
          <path d="M16 2 L28 7 L28 16 C28 22 22 27 16 30 C10 27 4 22 4 16 L4 7 Z"/>
        </svg>
      </div>
      <div>
        <div class="notif-title">${opts.title || 'ManOS'}</div>
        <div class="notif-body">${opts.body || ''}</div>
      </div>
    `;
    container.appendChild(el);
    gsap.fromTo(el, { x: 320, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
    const dismiss = () => {
      gsap.to(el, { x: 320, opacity: 0, duration: 0.3, ease: 'power2.in', onComplete: () => el.remove() });
    };
    el.addEventListener('click', dismiss);
    setTimeout(dismiss, opts.duration || 5000);
  }
};

// ─── 10. CONTEXT MENU ───────────────────────────────────────────
const ContextMenu = {
  show(x, y, items) {
    const menu = document.getElementById('context-menu');
    menu.innerHTML = '';
    items.forEach(item => {
      if (item === '---') {
        const sep = document.createElement('div');
        sep.style.cssText = 'height:1px;background:var(--os-border);margin:4px 0';
        menu.appendChild(sep);
        return;
      }
      const btn = document.createElement('div');
      btn.style.cssText = 'padding:7px 14px;font-size:0.8rem;color:var(--os-text-1);cursor:pointer;border-radius:6px;transition:background 0.1s';
      btn.textContent = item.label;
      btn.addEventListener('mouseenter', () => { btn.style.background = 'rgba(26,111,255,0.18)'; });
      btn.addEventListener('mouseleave', () => { btn.style.background = ''; });
      btn.addEventListener('click', () => { item.action(); this.hide(); });
      menu.appendChild(btn);
    });
    menu.style.display = 'block';
    menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
    menu.style.top = Math.min(y, window.innerHeight - 200) + 'px';
  },
  hide() { document.getElementById('context-menu').style.display = 'none'; }
};

document.getElementById('desktop').addEventListener('contextmenu', (e) => {
  if (e.target.closest('.window') || e.target.closest('#dock') || e.target.closest('#menubar')) return;
  e.preventDefault();
  ContextMenu.show(e.clientX, e.clientY, [
    { label: 'Open Finder',   action: () => Desktop.openApp('finder') },
    { label: 'Open Terminal', action: () => Desktop.openApp('terminal') },
    '---',
    { label: 'Change Wallpaper', action: () => Notify.show({ title: 'ManOS', body: 'Wallpaper locked by administrator.', duration: 3000 }) },
    { label: 'About ManOS', action: () => WM.create('about', {
      title: 'About ManOS', width: 400, height: 220, resizable: false,
      content: '<div style="padding:32px;text-align:center"><div style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:8px">ManOS 2.0</div><div style="font-size:0.85rem;color:var(--os-text-2)">Manan Shah Portfolio<br>Built with vanilla JS + Three.js + GSAP<br><br><span style="color:var(--os-text-3);font-size:0.75rem">© 2026 Manan Shah. All rights reserved.</span></div></div>'
    }) },
  ]);
});
document.addEventListener('click', (e) => { if (!e.target.closest('#context-menu')) ContextMenu.hide(); });

// ─── COMMAND PALETTE ────────────────────────────────────────────
const CommandPalette = {
  open: false, selectedIdx: 0, items: [],
  allItems: [
    { type: 'App', name: 'Finder',       action: () => Desktop.openApp('finder') },
    { type: 'App', name: 'Terminal',     action: () => Desktop.openApp('terminal') },
    { type: 'App', name: 'Case Files',   action: () => Desktop.openApp('projects') },
    { type: 'App', name: 'Intel',        action: () => Desktop.openApp('research') },
    { type: 'App', name: 'Field Record', action: () => Desktop.openApp('experience') },
    { type: 'App', name: 'Capabilities', action: () => Desktop.openApp('skills') },
    { type: 'App', name: 'Contact',      action: () => Desktop.openApp('contact') },
    { type: 'Project', name: 'PhishNet',       action: () => Desktop.openApp('projects') },
    { type: 'Project', name: 'AegisScan',      action: () => Desktop.openApp('projects') },
    { type: 'Project', name: 'Cloud-IR-Lab',   action: () => Desktop.openApp('projects') },
    { type: 'Project', name: 'Log-Aggregator', action: () => Desktop.openApp('projects') },
    { type: 'Command', name: 'whoami',          action: () => Desktop.openApp('terminal') },
    { type: 'Command', name: 'ls projects/',    action: () => Desktop.openApp('terminal') },
    { type: 'Command', name: 'sudo hire manan', action: () => Desktop.openApp('terminal') },
    { type: 'Command', name: 'ping github',     action: () => Desktop.openApp('terminal') },
    { type: 'Command', name: 'cat skills',      action: () => Desktop.openApp('terminal') },
    { type: 'Command', name: 'curl contact',    action: () => Desktop.openApp('terminal') },
  ],
  toggle() { if (this.open) this.close(); else this.show(); },
  show() {
    this.open = true;
    const overlay = document.getElementById('command-palette-overlay');
    overlay.style.display = 'flex';
    gsap.fromTo(document.getElementById('command-palette'), { scale: 0.92, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.2, ease: 'power2.out' });
    const input = document.getElementById('palette-input');
    input.value = '';
    this.selectedIdx = 0;
    this.filter('');
    setTimeout(() => input.focus(), 50);
  },
  close() {
    this.open = false;
    gsap.to(document.getElementById('command-palette'), { scale: 0.92, opacity: 0, duration: 0.15, ease: 'power2.in', onComplete: () => {
      document.getElementById('command-palette-overlay').style.display = 'none';
    }});
  },
  filter(q) {
    const lq = q.toLowerCase();
    this.items = q ? this.allItems.filter(it => it.name.toLowerCase().includes(lq) || it.type.toLowerCase().includes(lq)) : this.allItems;
    this.selectedIdx = 0;
    this.renderResults();
  },
  renderResults() {
    const el = document.getElementById('palette-results');
    if (!el) return;
    if (!this.items.length) { el.innerHTML = '<div class="palette-empty">No results</div>'; return; }
    el.innerHTML = '';
    const icons = {
      App:     '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      Project: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
      Command: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
    };
    this.items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'palette-item' + (i === this.selectedIdx ? ' selected' : '');
      div.innerHTML = `<span class="palette-item-icon">${icons[item.type] || ''}</span><span class="palette-item-name">${item.name}</span><span class="palette-item-type">${item.type}</span>`;
      div.addEventListener('click', () => { item.action(); this.close(); });
      div.addEventListener('mouseenter', () => { this.selectedIdx = i; this.highlight(); });
      el.appendChild(div);
    });
  },
  highlight() {
    document.querySelectorAll('.palette-item').forEach((el, i) => el.classList.toggle('selected', i === this.selectedIdx));
  },
  init() {
    const input = document.getElementById('palette-input');
    if (!input) return;
    input.addEventListener('input', () => this.filter(input.value));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') { e.preventDefault(); this.selectedIdx = Math.min(this.selectedIdx + 1, this.items.length - 1); this.highlight(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); this.selectedIdx = Math.max(this.selectedIdx - 1, 0); this.highlight(); }
      else if (e.key === 'Enter') { if (this.items[this.selectedIdx]) { this.items[this.selectedIdx].action(); this.close(); } }
      else if (e.key === 'Escape') { this.close(); }
    });
    document.getElementById('command-palette-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('command-palette-overlay')) this.close();
    });
  }
};

// ─── KEYBOARD SHORTCUTS ─────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { ContextMenu.hide(); if (CommandPalette.open) CommandPalette.close(); }
  const key = e.key.toLowerCase();
  const mod = e.ctrlKey || e.metaKey;
  if (mod && key === '1') { e.preventDefault(); Desktop.openApp('finder'); }
  if (mod && key === '2') { e.preventDefault(); Desktop.openApp('terminal'); }
  if (mod && key === '3') { e.preventDefault(); Desktop.openApp('projects'); }
  if (mod && key === 'w') { e.preventDefault(); if (OS.activeWindow) WM.close(OS.activeWindow); }
  if (mod && key === 'm') { e.preventDefault(); if (OS.activeWindow) WM.minimize(OS.activeWindow); }
  if (mod && key === 'k') { e.preventDefault(); CommandPalette.toggle(); }
  if (mod && key === '4') { e.preventDefault(); if (NetworkMode.active) NetworkMode.exit(); else NetworkMode.enter(); }
  if (!mod && e.key === 'n' && !e.target.closest('input, textarea')) { if (NetworkMode.active) NetworkMode.exit(); else NetworkMode.enter(); }
  if (e.code === 'Backquote') {
    e.preventDefault();
    if (OS.windows['terminal']) {
      if (OS.windows['terminal'].minimized) WM.restore('terminal');
      else WM.focus('terminal');
    } else {
      Desktop.openApp('terminal');
    }
  }
});

// ─── 11. CURSOR ─────────────────────────────────────────────────
const Cursor = {
  el: null, x: 0, y: 0, tx: 0, ty: 0,
  init() {
    this.el = document.getElementById('cursor');
    this.loop();
  },
  update(e) {
    this.tx = e.clientX;
    this.ty = e.clientY;
    this.setState(e);
  },
  loop() {
    this.x += (this.tx - this.x) * 0.18;
    this.y += (this.ty - this.y) * 0.18;
    if (this.el) {
      this.el.style.left = this.x + 'px';
      this.el.style.top  = this.y + 'px';
    }
    requestAnimationFrame(() => this.loop());
  },
  setState(e) {
    if (!this.el) return;
    const t = e.target;
    if (t.closest('a[href], button, .dock-item, .wc-close, .wc-minimize, .wc-maximize, .desktop-icon')) {
      this.el.className = 'hover';
    } else if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.closest('#term-input')) {
      this.el.className = 'text';
    } else {
      this.el.className = '';
    }
  }
};

// ─── 12. GRAIN ──────────────────────────────────────────────────
const Grain = {
  init() {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 256;
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(256, 256);
    for (let i = 0; i < imageData.data.length; i += 4) {
      const v = Math.random() * 255;
      imageData.data[i] = imageData.data[i+1] = imageData.data[i+2] = v;
      imageData.data[i+3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);
    const grainEl = document.createElement('div');
    grainEl.className = 'grain';
    grainEl.style.backgroundImage = `url(${canvas.toDataURL()})`;
    document.body.appendChild(grainEl);
  }
};


// ─── 13. INIT ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  Grain.init();
  Wallpaper.init();
  MenuBar.init();
  Desktop.init();
  Dock.init();
  Cursor.init();
  CommandPalette.init();
  Boot.init();
});
