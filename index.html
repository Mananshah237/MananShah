<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050D1A">
<meta property="og:title" content="ManOS | Manan Shah — Cybersecurity Engineer">
<meta property="og:description" content="Interactive cybersecurity portfolio OS. Container security, AppSec, Cloud IR — built by Manan Shah.">
<meta property="og:image" content="assets/og-preview.png">
<meta property="og:url" content="https://mananshah237.github.io">
<meta name="twitter:card" content="summary_large_image">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src https://api.github.com https://formspree.io; frame-src 'none'; object-src 'none'; base-uri 'self'">
<title>ManOS | Manan Shah — Cybersecurity Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --os-bg:          #050D1A;
  --os-surface:     #0A1628;
  --os-surface-2:   #0F1E35;
  --os-surface-3:   #152540;
  --os-glass:       rgba(10, 22, 40, 0.82);
  --os-accent:      #1A6FFF;
  --os-accent-2:    #00C2FF;
  --os-accent-glow: rgba(26, 111, 255, 0.35);
  --os-green:       #00E87A;
  --os-red:         #FF3B5C;
  --os-amber:       #FFB800;
  --os-text-1:      #F0F5FF;
  --os-text-2:      #8CA0C0;
  --os-text-3:      #3A4F6B;
  --os-text-code:   #00C2FF;
  --os-border:      #152035;
  --os-border-2:    #1E3050;
  --font-display:   'Syne', sans-serif;
  --font-body:      'DM Sans', sans-serif;
  --font-mono:      'JetBrains Mono', monospace;
  --shadow-window:  0 32px 80px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-dock:    0 8px 32px rgba(0,0,0,0.5);
  --ease-spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-out:       cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out:    cubic-bezier(0.65, 0, 0.35, 1);
  --space-1: 4px;  --space-2: 8px;   --space-3: 12px;
  --space-4: 16px; --space-5: 24px;  --space-6: 32px;
  --space-7: 48px; --space-8: 64px;  --space-9: 96px;
}

body {
  background: var(--os-bg);
  overflow: hidden;
  cursor: none;
  font-family: var(--font-body);
  color: var(--os-text-1);
  height: 100vh;
}

#boot {
  position: fixed;
  inset: 0;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 9999;
}
#boot-shield { width: 32px; height: 32px; color: var(--os-accent); }
#boot-title {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--os-text-2);
  letter-spacing: 0.4em;
}
#boot-bar-wrap {
  width: 280px;
  height: 2px;
  background: var(--os-border);
  border-radius: 2px;
  overflow: hidden;
}
#boot-bar {
  height: 100%;
  width: 100%;
  background: var(--os-accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
}
#boot-status {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--os-text-3);
}

#canvas-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at 30% 40%, #0A1A35 0%, #050D1A 70%);
}

#desktop {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
}

#menubar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 28px;
  background: rgba(5,13,26,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  justify-content: space-between;
  pointer-events: all;
}
#menubar-left, #menubar-right { display: flex; align-items: center; gap: 12px; }
#menubar-appname { font-size: 0.78rem; font-weight: 600; }
#menubar-clock { font-family: var(--font-mono); font-size: 0.75rem; color: var(--os-text-2); }

#desktop-icons {
  position: fixed;
  right: 24px;
  top: 60px;
  display: grid;
  grid-template-columns: repeat(2, 72px);
  gap: 8px 8px;
  pointer-events: all;
}
.desktop-icon {
  width: 72px;
  height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.15s ease;
  user-select: none;
}
.desktop-icon:hover { transform: scale(1.05); }
.desktop-icon.selected { background: rgba(26,111,255,0.15); }
.desktop-icon svg { width: 48px; height: 48px; }
.desktop-icon-label {
  font-size: 0.68rem;
  color: var(--os-text-2);
  text-align: center;
  max-width: 68px;
  line-height: 1.2;
}

#dock {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 8px 12px;
  display: flex;
  align-items: flex-end;
  gap: 4px;
  z-index: 999;
  pointer-events: all;
  box-shadow: var(--shadow-dock);
}
.dock-item {
  position: relative;
  width: 52px;
  height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s ease-out;
  flex-shrink: 0;
}
.dock-item svg { width: 32px; height: 32px; }
.dock-item-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--os-text-1);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}
.dock-item:hover .dock-item-tooltip { opacity: 1; }
.dock-active-dot {
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--os-green);
  display: none;
}
.dock-active-dot.visible { display: block; }
.dock-separator {
  width: 1px;
  height: 36px;
  background: rgba(255,255,255,0.12);
  margin: 0 4px;
  align-self: center;
}

#notifications {
  position: fixed;
  top: 44px;
  right: 16px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.notif {
  width: 300px;
  background: var(--os-glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  pointer-events: all;
  cursor: pointer;
}
.notif-icon { width: 28px; height: 28px; flex-shrink: 0; }
.notif-title { font-size: 0.8rem; font-weight: 600; color: var(--os-text-1); }
.notif-body { font-size: 0.78rem; color: var(--os-text-2); margin-top: 2px; }

#cursor {
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  width: 10px;
  height: 10px;
  background: var(--os-text-1);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: transform 0.15s, background 0.15s, opacity 0.15s;
}
#cursor.hover {
  width: 28px;
  height: 28px;
  background: transparent;
  border: 2px solid var(--os-accent);
}
#cursor.text {
  width: 2px;
  height: 18px;
  border-radius: 1px;
  background: var(--os-text-2);
}

.grain {
  position: fixed;
  inset: -50%;
  width: 200%;
  height: 200%;
  pointer-events: none;
  z-index: 9000;
  opacity: 0.038;
  animation: grain 0.5s steps(2) infinite;
}
@keyframes grain {
  0%   { transform: translate(0,0); }
  50%  { transform: translate(-2%,-2%); }
  100% { transform: translate(2%,2%); }
}
@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.4); opacity: 0.6; }
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-18px); }
}

/* WINDOWS */
.window {
  position: fixed;
  display: flex;
  flex-direction: column;
  background: var(--os-glass);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  box-shadow: var(--shadow-window);
  min-width: 400px;
  min-height: 280px;
  overflow: hidden;
  user-select: none;
  pointer-events: all;
}
.window.focused { border-color: rgba(255,255,255,0.1); }
.window-titlebar {
  height: 38px;
  min-height: 38px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--os-border);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: grab;
  user-select: none;
}
.window-titlebar:active { cursor: grabbing; }
.window-controls {
  position: absolute;
  left: 16px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.wc-close, .wc-minimize, .wc-maximize {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  padding: 0;
}
.wc-close    { background: var(--os-red); }
.wc-minimize { background: var(--os-amber); }
.wc-maximize { background: #3B82F6; }
.window-title {
  font-family: var(--font-body);
  font-size: 0.78rem;
  color: var(--os-text-3);
  pointer-events: none;
}
.window-body {
  flex: 1;
  overflow: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--os-border-2) transparent;
  position: relative;
  z-index: 1;
}
.window-resize-handle {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 16px;
  height: 16px;
  cursor: se-resize;
}
.window::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(200px at var(--mouse-x, -999px) var(--mouse-y, -999px), rgba(26,111,255,0.05), transparent);
  border-radius: inherit;
  pointer-events: none;
  z-index: 0;
}

/* CONTEXT MENU */
#context-menu {
  position: fixed;
  display: none;
  z-index: 3000;
  background: var(--os-glass);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 6px;
  min-width: 180px;
  pointer-events: all;
}

/* TERMINAL */
#term-output {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-family: var(--font-mono);
  font-size: 0.82rem;
}
#term-input-row {
  height: 36px;
  border-top: 1px solid var(--os-border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
}
.term-prompt { color: var(--os-green); font-family: var(--font-mono); font-size: 0.82rem; }
#term-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--os-text-code);
  caret-color: var(--os-green);
}
.t-cmd     { color: var(--os-accent); }
.t-out     { color: var(--os-text-2); }
.t-success { color: var(--os-green); }
.t-error   { color: var(--os-red); }
.t-code    { color: var(--os-text-code); font-family: var(--font-mono); }
.t-dim     { color: var(--os-text-3); }

/* FINDER */
.finder-wrap { display: flex; height: 100%; }
.finder-sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--os-surface-2);
  border-right: 1px solid var(--os-border);
  padding: 12px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.finder-sidebar-item {
  padding: 8px 16px;
  font-size: 0.82rem;
  color: var(--os-text-2);
  cursor: pointer;
  border-radius: 6px;
  margin: 0 6px;
  transition: background 0.12s, color 0.12s;
}
.finder-sidebar-item:hover { background: var(--os-surface-3); color: var(--os-text-1); }
.finder-sidebar-item.active { background: rgba(26,111,255,0.18); color: var(--os-accent); }
.finder-main { flex: 1; overflow-y: auto; padding: 28px; }

/* PROJECTS */
.projects-wrap { display: flex; height: 100%; }
.projects-sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--os-surface-2);
  border-right: 1px solid var(--os-border);
  padding: 12px 0;
  overflow-y: auto;
}
.project-sidebar-item {
  padding: 12px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.12s;
}
.project-sidebar-item:hover { background: var(--os-surface-3); }
.project-sidebar-item.active { border-left-color: var(--os-accent); background: var(--os-surface-3); }
.project-case-num { font-family: var(--font-mono); font-size: 0.68rem; color: var(--os-accent); margin-bottom: 2px; }
.project-name-sidebar { font-size: 0.88rem; color: var(--os-text-1); margin-bottom: 2px; }
.project-tag-sidebar { font-size: 0.65rem; color: var(--os-text-3); }
.projects-detail { flex: 1; overflow-y: auto; padding: 32px; position: relative; }
.project-watermark {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 6rem;
  color: var(--os-text-1);
  opacity: 0.04;
  position: absolute;
  top: 12px;
  right: 16px;
  pointer-events: none;
  user-select: none;
}

/* SKILLS */
.skills-wrap { display: flex; height: 100%; }
.skills-chart-panel { flex-basis: 280px; min-width: 280px; padding: 24px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--os-border); }
.skills-tags-panel { flex: 1; overflow-y: auto; padding: 24px; }
.tag-pill {
  display: inline-block;
  font-family: var(--font-body);
  font-size: 0.7rem;
  background: var(--os-surface-3);
  border: 1px solid var(--os-border-2);
  border-radius: 100px;
  padding: 3px 12px;
  margin: 3px;
  color: var(--os-text-2);
  cursor: default;
  transition: border-color 0.15s, color 0.15s;
}
.tag-pill:hover { border-color: var(--os-accent); color: var(--os-accent); }

/* RESEARCH */
.research-wrap { padding: 36px; overflow-y: auto; height: 100%; }
.research-item {
  background: var(--os-surface-2);
  border: 1px solid var(--os-border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 24px;
}
.research-progress-bar {
  height: 4px;
  background: var(--os-border);
  border-radius: 4px;
  margin-top: 12px;
  overflow: hidden;
}
.research-progress-fill {
  height: 100%;
  background: var(--os-accent);
  width: 100%;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 1s ease-out;
  border-radius: 4px;
}

/* EXPERIENCE */
.experience-wrap { padding: 32px; overflow-y: auto; height: 100%; max-width: 640px; margin: 0 auto; }
.exp-entry {
  display: flex;
  gap: 20px;
  margin-bottom: 36px;
  opacity: 0;
  transform: translateX(20px);
}
.exp-entry.visible { opacity: 1; transform: translateX(0); transition: opacity 0.5s ease, transform 0.5s ease; }
.exp-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--os-accent);
  filter: drop-shadow(0 0 6px var(--os-accent));
  flex-shrink: 0;
  margin-top: 5px;
}
.exp-line-wrap { display: flex; flex-direction: column; align-items: center; }
.exp-vert-line { width: 2px; flex: 1; background: var(--os-accent); opacity: 0.3; margin-top: 4px; }
.exp-content { flex: 1; }
.exp-period { font-family: var(--font-mono); font-size: 0.72rem; color: var(--os-accent); margin-bottom: 4px; }
.exp-role { font-family: var(--font-display); font-size: 1rem; font-weight: 600; color: var(--os-text-1); }
.exp-org { font-size: 0.82rem; color: var(--os-text-3); margin-bottom: 8px; }

/* CONTACT */
.contact-wrap {
  padding: 40px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
}
.contact-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--os-border);
  width: 100%;
  text-decoration: none;
  color: var(--os-text-1);
  border-radius: 8px;
  transition: background 0.15s;
  cursor: pointer;
}
.contact-row:last-child { border-bottom: none; }
.contact-row:hover { background: var(--os-surface-3); }
.contact-row-icon { width: 24px; height: 24px; flex-shrink: 0; margin-left: 8px; }
.contact-row-label { font-size: 0.78rem; color: var(--os-text-3); width: 70px; text-align: left; }
.contact-row-value { font-size: 0.88rem; color: var(--os-text-1); text-decoration: none; }

/* STACK PILLS */
.stack-pill {
  display: inline-block;
  font-size: 0.7rem;
  background: var(--os-surface-3);
  border: 1px solid var(--os-border-2);
  border-radius: 100px;
  padding: 3px 10px;
  margin: 2px;
  color: var(--os-text-2);
}

/* SECTION LABELS */
.section-label {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--os-text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
  margin-top: 18px;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  /* No custom cursor on touch */
  #cursor { display: none !important; }

  /* Desktop icons hidden — dock covers all apps */
  #desktop-icons { display: none !important; }

  /* Dock becomes a full-width bottom bar */
  #dock {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    transform: none !important;
    width: 100% !important;
    border-radius: 0 !important;
    border-left: none !important;
    border-right: none !important;
    border-bottom: none !important;
    padding: 6px 8px !important;
    padding-bottom: max(6px, env(safe-area-inset-bottom)) !important;
    justify-content: space-around !important;
    gap: 0 !important;
  }
  .dock-item {
    width: 44px !important;
    height: 44px !important;
    margin: 0 !important;
    transform: none !important;
    border-radius: 10px !important;
  }
  .dock-item svg { width: 28px !important; height: 28px !important; }
  .dock-item-tooltip { display: none !important; }
  .dock-separator { display: none !important; }

  /* Windows fill the space between menubar and dock */
  .window {
    left: 0 !important;
    top: 28px !important;
    width: 100vw !important;
    height: calc(100vh - 28px - 68px) !important;
    border-radius: 0 !important;
    min-width: unset !important;
    min-height: unset !important;
  }
  .window-resize-handle { display: none !important; }

  /* Slim down menu bar on mobile */
  .menubar-right .battery-icon,
  .menubar-right .wifi-icon { display: none !important; }
}

/* STAT CARDS */
.stat-card {
  background: var(--os-surface-3);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
}
.stat-number {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 800;
  color: var(--os-accent);
  line-height: 1;
}
.stat-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--os-text-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* SPARKLINE */
.sparkline-svg { display: block; width: 100%; height: 48px; }

/* COMMAND PALETTE */
#command-palette-overlay { display: none; }
#command-palette-overlay.open { display: flex; }
.palette-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  font-size: 0.88rem; color: var(--os-text-2);
  transition: background 0.1s;
}
.palette-item:hover, .palette-item.selected {
  background: rgba(26,111,255,0.15); color: var(--os-text-1);
}
.palette-item-icon { width: 28px; height: 28px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--os-surface-3); border-radius: 6px; }
.palette-item-name { flex: 1; font-weight: 500; }
.palette-item-type { font-size: 0.7rem; color: var(--os-text-3); }
.palette-section-label { padding: 6px 12px 2px; font-size: 0.68rem; color: var(--os-text-3); text-transform: uppercase; letter-spacing: 0.08em; }
.palette-empty { padding: 24px; text-align: center; color: var(--os-text-3); font-size: 0.85rem; }

/* ACTIVITY FEED */
.activity-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--os-border); }
.activity-row:last-child { border-bottom: none; }
.activity-icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.activity-repo { font-size: 0.82rem; color: var(--os-text-1); flex: 1; font-family: var(--font-mono); }
.activity-time { font-size: 0.72rem; color: var(--os-text-3); white-space: nowrap; }
@keyframes skeleton-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
.skeleton-row { height: 36px; background: var(--os-surface-3); border-radius: 6px; margin-bottom: 8px; animation: skeleton-pulse 1.4s ease-in-out infinite; }

/* LIVE BADGE */
.live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.65rem; font-weight: 700; color: var(--os-green); text-transform: uppercase; letter-spacing: 0.1em; padding: 2px 8px; border: 1px solid rgba(0,232,122,0.3); border-radius: 100px; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--os-green); animation: pulse 2s infinite; }

/* CONTACT FORM */
.contact-form-field { width: 100%; background: var(--os-surface-2); border: 1px solid var(--os-border-2); border-radius: 8px; padding: 10px 12px; font-family: var(--font-body); font-size: 0.88rem; color: var(--os-text-1); outline: none; box-sizing: border-box; transition: border-color 0.15s; }
.contact-form-field:focus { border-color: var(--os-accent); }
.contact-form-field::placeholder { color: var(--os-text-3); }
.contact-form-btn { width: 100%; padding: 11px; background: var(--os-accent); border: none; border-radius: 8px; color: #fff; font-family: var(--font-body); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.contact-form-btn:hover { opacity: 0.88; }
.contact-form-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.contact-form-error { font-size: 0.78rem; color: var(--os-red); margin-top: 6px; min-height: 18px; }
</style>
</head>

        <input id="palette-input" type="text" placeholder="Search apps, projects, commands…" autocomplete="off" spellcheck="false" maxlength="64" style="flex:1;background:transparent;border:none;outline:none;font-family:var(--font-body);font-size:1rem;color:var(--os-text-1);caret-color:var(--os-accent)">

  <div id="net-hud" style="position:absolute;top:20px;left:24px;font-family:var(--font-mono);font-size:0.72rem;color:var(--os-text-3);letter-spacing:0.2em;opacity:0;transition:opacity 0.4s;pointer-events:none">
    ManOS // NETWORK MODE

  <button id="net-exit" style="position:absolute;top:20px;right:24px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--os-text-2);font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.15em;padding:6px 14px;cursor:pointer;opacity:0;transition:opacity 0.4s">ESC // EXIT NETWORK</button>
  <div id="net-panel" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.85);width:min(960px,96vw);max-height:88vh;background:var(--os-glass);backdrop-filter:blur(32px) saturate(160%);-webkit-backdrop-filter:blur(32px) saturate(160%);border:1px solid rgba(255,255,255,0.08);border-radius:20px;box-shadow:0 40px 100px rgba(0,0,0,0.7),0 0 60px var(--os-accent-glow);overflow-y:auto;opacity:0;pointer-events:none;z-index:10;padding:44px 52px 44px 52px">
    <button id="net-panel-close" style="position:absolute;top:16px;right:16px;background:rgba(255,59,92,0.15);border:1px solid rgba(255,59,92,0.3);border-radius:50%;width:28px;height:28px;color:var(--os-red);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
    <div id="net-panel-content"></div>

</div>


<script>
// ─── 1. STATE ────────────────────────────────────────────────────
const OS = {
  windows: {},
  zIndex: 100,
  activeWindow: null,
  bootComplete: false,
  dragState: null,
  resizeState: null,
  cmdHistory: [],
  historyIdx: -1,
};

// ─── ICONS ───────────────────────────────────────────────────────
const ICONS = {
  finder: `<svg viewBox="0 0 48 48" fill="none" stroke="var(--os-accent-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12C8 10 10 8 12 8H36C38 8 40 10 40 12V36C40 38 38 40 36 40H12C10 40 8 38 8 36V12Z"/><path d="M8 18H40"/><path d="M18 18V40"/></svg>`,
  terminal: `<svg viewBox="0 0 48 48" fill="none" stroke="var(--os-green)" stroke-width="2.5" stroke-linecap="round"><path d="M8 32L20 24L8 16"/><path d="M24 32H40"/><rect x="6" y="8" width="36" height="32" rx="4" stroke-width="2"/></svg>`,
  projects: `<svg viewBox="0 0 48 48" fill="none" stroke="var(--os-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="14" width="28" height="26" rx="3"/><path d="M16 14V10C16 9 17 8 18 8H30C31 8 32 9 32 10V14"/><path d="M16 24H32"/><path d="M16 30H26"/></svg>`,
  research: `<svg viewBox="0 0 48 48" fill="none" stroke="var(--os-amber)" stroke-width="2.5" stroke-linecap="round"><circle cx="22" cy="22" r="12"/><path d="M31 31L42 42"/></svg>`,
  experience: `<svg viewBox="0 0 48 48" fill="none" stroke="var(--os-accent-2)" stroke-width="2" stroke-linecap="round"><circle cx="24" cy="24" r="16"/><path d="M24 14V24L30 30"/></svg>`,
  skills: `<svg viewBox="0 0 48 48" fill="none" stroke="var(--os-green)" stroke-width="2" stroke-linecap="round"><circle cx="24" cy="24" r="16"/><circle cx="24" cy="24" r="10"/><circle cx="24" cy="24" r="4"/><path d="M24 8V14"/><path d="M24 34V40"/><path d="M8 24H14"/><path d="M34 24H40"/></svg>`,
  contact: `<svg viewBox="0 0 48 48" fill="none" stroke="var(--os-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="12" width="36" height="26" rx="4"/><path d="M6 16L24 28L42 16"/></svg>`,
  resume: `<svg viewBox="0 0 48 48" fill="none" stroke="var(--os-text-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="4" width="24" height="32" rx="3"/><path d="M16 14H28"/><path d="M16 20H28"/><path d="M16 26H22"/><path d="M24 36L24 44"/><path d="M18 40L24 44L30 40"/></svg>`,
  network: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="10" r="5" stroke="var(--os-accent)" stroke-width="2"/><circle cx="10" cy="36" r="5" stroke="var(--os-accent)" stroke-width="2"/><circle cx="38" cy="36" r="5" stroke="var(--os-accent)" stroke-width="2"/><line x1="24" y1="15" x2="10" y2="31" stroke="var(--os-accent)" stroke-width="1.5" stroke-opacity="0.6"/><line x1="24" y1="15" x2="38" y2="31" stroke="var(--os-accent)" stroke-width="1.5" stroke-opacity="0.6"/><line x1="15" y1="36" x2="33" y2="36" stroke="var(--os-accent)" stroke-width="1.5" stroke-opacity="0.6"/><circle cx="24" cy="10" r="2" fill="var(--os-accent)"/><circle cx="10" cy="36" r="2" fill="var(--os-accent)"/><circle cx="38" cy="36" r="2" fill="var(--os-accent)"/></svg>`,
};

const DOCK_APPS = [
  { id: 'finder',     label: 'Finder' },
  { id: 'terminal',   label: 'Terminal' },
  { id: 'projects',   label: 'Case Files' },
  { id: 'research',   label: 'Intel' },
  { id: 'experience', label: 'Field Record' },
  { id: 'skills',     label: 'Capabilities' },
  { id: 'contact',    label: 'Contact' },
  { id: 'network',    label: 'Network (N)' },
  null,
  { id: 'resume',     label: 'Resume.pdf' },
];

const DESKTOP_ICONS = [
  { id: 'finder',     label: 'Finder' },
  { id: 'terminal',   label: 'Terminal' },
  { id: 'projects',   label: 'Case Files' },
  { id: 'research',   label: 'Intel' },
  { id: 'experience', label: 'Field Record' },
  { id: 'skills',     label: 'Capabilities' },
  { id: 'contact',    label: 'Contact' },
  { id: 'network',    label: 'Network' },
  { id: 'resume',     label: 'Resume.pdf' },
];

// ─── 2. BOOT ────────────────────────────────────────────────────
const Boot = {
  skipEnabled: false,
  steps: [
    { t: 0,    pct: 0,   msg: 'Initializing ManOS...' },
    { t: 400,  pct: 18,  msg: 'Loading kernel modules...' },
    { t: 750,  pct: 35,  msg: 'Mounting filesystem...' },
    { t: 1000, pct: 52,  msg: 'Starting window compositor...' },
    { t: 1300, pct: 70,  msg: 'Loading user profile: manan' },
    { t: 1600, pct: 85,  msg: 'Applying security policies...' },
    { t: 1900, pct: 95,  msg: 'Launching desktop environment...' },
    { t: 2200, pct: 100, msg: 'Welcome, Manan.' },
  ],
  init() {
    if (localStorage.getItem('aegis-booted')) {
      document.getElementById('boot').style.display = 'none';
      document.getElementById('desktop').style.opacity = '1';
      OS.bootComplete = true;
      setTimeout(() => {
        Desktop.openApp('finder');
        Notify.show({ title: 'ManOS', body: 'Welcome back, Manan.', duration: 4000 });
      }, 300);
      return;
    }
    document.addEventListener('keydown', () => { if (Boot.skipEnabled) Boot.finish(); }, { once: true });
    document.addEventListener('click', () => { if (Boot.skipEnabled) Boot.finish(); }, { once: true });
    this.steps.forEach(s => setTimeout(() => this.step(s.msg, s.pct), s.t));
    setTimeout(() => { Boot.skipEnabled = true; }, 1500);
    setTimeout(() => Boot.finish(), 3000);
  },
  step(msg, pct) {
    document.getElementById('boot-status').textContent = msg;
    document.getElementById('boot-bar').style.transform = `scaleX(${pct / 100})`;
  },
  finish() {
    Boot.skipEnabled = false;
    const boot = document.getElementById('boot');
    const desktop = document.getElementById('desktop');
    gsap.to(boot, { opacity: 0, duration: 0.4, onComplete: () => { boot.style.display = 'none'; } });
    gsap.to(desktop, { opacity: 1, duration: 0.4, delay: 0.1 });
    localStorage.setItem('aegis-booted', '1');
    OS.bootComplete = true;
    setTimeout(() => Desktop.openApp('finder'), 600);
    setTimeout(() => Notify.show({ title: 'ManOS', body: 'Welcome, Manan. All systems operational.', duration: 5000 }), 1200);
  }
};

// ─── 3. WINDOW MANAGER ──────────────────────────────────────────
const WM = {
  cascadeX: 80, cascadeY: 60, cascadeCount: 0,
  cascade() {
    const x = this.cascadeX + (this.cascadeCount % 6) * 24;
    const y = this.cascadeY + (this.cascadeCount % 6) * 24;
    this.cascadeCount++;
    return { x, y };
  },
  create(id, opts) {
    if (OS.windows[id]) { this.focus(id); if (OS.windows[id].minimized) this.restore(id); return; }
    const pos = (opts.x !== undefined) ? { x: opts.x, y: opts.y } : this.cascade();
    const w = opts.width || 700;
    const h = opts.height || 500;
    const el = document.createElement('div');
    el.className = 'window';
    el.id = 'win-' + id;
    el.setAttribute('role', 'dialog');
    el.setAttribute('aria-label', opts.title);
    el.style.cssText = `width:${w}px;height:${h}px;left:${pos.x}px;top:${pos.y}px;z-index:${++OS.zIndex}`;
    if (opts.minW) el.style.minWidth = opts.minW + 'px';
    if (opts.minH) el.style.minHeight = opts.minH + 'px';
    el.innerHTML = `
      <div class="window-titlebar" data-win-id="${id}">
        <div class="window-controls">
          <button class="wc-close" data-win-id="${id}" aria-label="Close"></button>
          <button class="wc-minimize" data-win-id="${id}" aria-label="Minimize"></button>
          <button class="wc-maximize" data-win-id="${id}" aria-label="Maximize"></button>
        </div>
        <span class="window-title">${opts.title}</span>
      </div>
      <div class="window-body" id="winbody-${id}">${opts.content || ''}</div>
      <div class="window-resize-handle" data-win-id="${id}"></div>
    `;
    document.getElementById('desktop').appendChild(el);
    OS.windows[id] = {
      el, minimized: false, focused: false,
      prevW: w, prevH: h, prevX: pos.x, prevY: pos.y,
      maximized: false, opts
    };
    el.querySelector('.wc-close').addEventListener('click', () => WM.close(id));
    el.querySelector('.wc-minimize').addEventListener('click', () => WM.minimize(id));
    el.querySelector('.wc-maximize').addEventListener('click', () => WM.toggleMaximize(id));
    el.querySelector('.window-titlebar').addEventListener('mousedown', (e) => {
      if (e.target.closest('.window-controls')) return;
      WM.startDrag(e, id);
    });
    el.querySelector('.window-titlebar').addEventListener('dblclick', (e) => {
      if (e.target.closest('.window-controls')) return;
      WM.toggleMaximize(id);
    });
    el.querySelector('.window-resize-handle').addEventListener('mousedown', (e) => WM.startResize(e, id));
    el.addEventListener('mousedown', () => WM.focus(id));
    el.addEventListener('mousemove', (e) => {
      const rect = el.getBoundingClientRect();
      el.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
      el.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
    });
    gsap.from(el, { scale: 0.88, opacity: 0, duration: 0.28, ease: 'cubic-bezier(0.34,1.56,0.64,1)', transformOrigin: 'center bottom' });
    this.focus(id);
    Dock.setActive(id, true);
    if (opts.onOpen) setTimeout(opts.onOpen, 80);
  },
  focus(id) {
    if (!OS.windows[id]) return;
    Object.keys(OS.windows).forEach(k => {
      if (OS.windows[k] && OS.windows[k].el) OS.windows[k].el.classList.remove('focused');
    });
    OS.zIndex++;
    OS.windows[id].el.style.zIndex = OS.zIndex;
    OS.windows[id].el.classList.add('focused');
    OS.activeWindow = id;
    MenuBar.setAppName(OS.windows[id].opts.title);
  },
  close(id) {
    if (!OS.windows[id]) return;
    const el = OS.windows[id].el;
    gsap.to(el, { scale: 0.88, opacity: 0, duration: 0.2, ease: 'power2.in', onComplete: () => {
      el.remove();
      delete OS.windows[id];
      Dock.setActive(id, false);
      if (OS.activeWindow === id) { OS.activeWindow = null; MenuBar.setAppName(''); }
    }});
  },
  minimize(id) {
    if (!OS.windows[id] || OS.windows[id].minimized) return;
    const el = OS.windows[id].el;
    const dockItem = document.querySelector(`.dock-item[data-app="${id}"]`);
    const dockRect = dockItem ? dockItem.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight };
    const dockX = dockRect.left - parseFloat(el.style.left);
    const dockY = dockRect.top - parseFloat(el.style.top);
    gsap.to(el, { x: dockX, y: dockY, scale: 0.1, opacity: 0, duration: 0.38, ease: 'power3.in', onComplete: () => { el.style.visibility = 'hidden'; } });
    OS.windows[id].minimized = true;
  },
  restore(id) {
    if (!OS.windows[id]) return;
    const el = OS.windows[id].el;
    el.style.visibility = 'visible';
    gsap.fromTo(el, { scale: 0.1, opacity: 0 }, { scale: 1, opacity: 1, x: 0, y: 0, duration: 0.38, ease: 'cubic-bezier(0.34,1.56,0.64,1)' });
    OS.windows[id].minimized = false;
    this.focus(id);
  },
  toggleMaximize(id) {
    if (!OS.windows[id]) return;
    const win = OS.windows[id];
    const el = win.el;
    if (!win.maximized) {
      win.prevW = el.offsetWidth; win.prevH = el.offsetHeight;
      win.prevX = parseFloat(el.style.left); win.prevY = parseFloat(el.style.top);
      gsap.to(el, { width: window.innerWidth, height: window.innerHeight - 28, left: 0, top: 28, duration: 0.3, ease: 'power2.out' });
      win.maximized = true;
    } else {
      gsap.to(el, { width: win.prevW, height: win.prevH, left: win.prevX, top: win.prevY, duration: 0.3, ease: 'power2.out' });
      win.maximized = false;
    }
  },
  startDrag(e, id) {
    if (window.innerWidth < 768) return;
    e.preventDefault();
    const el = OS.windows[id].el;
    OS.dragState = { id, offsetX: e.clientX - parseFloat(el.style.left), offsetY: e.clientY - parseFloat(el.style.top) };
    this.focus(id);
  },
  onDrag(e) {
    if (!OS.dragState) return;
    const { id, offsetX, offsetY } = OS.dragState;
    if (!OS.windows[id]) return;
    const el = OS.windows[id].el;
    el.style.left = (e.clientX - offsetX) + 'px';
    el.style.top = Math.max(28, e.clientY - offsetY) + 'px';
    // Edge snap detection — show snap preview ghost
    const snapEl = document.getElementById('snap-preview');
    if (!snapEl) return;
    if (e.clientY < 32) {
      snapEl.style.cssText = 'display:block;position:fixed;z-index:95;background:rgba(26,111,255,0.1);border:2px solid rgba(26,111,255,0.4);border-radius:10px;pointer-events:none;left:0;top:28px;width:100vw;height:calc(100vh - 28px)';
      OS.dragState.snapTarget = 'maximize';
    } else if (e.clientX < 8) {
      snapEl.style.cssText = 'display:block;position:fixed;z-index:95;background:rgba(26,111,255,0.1);border:2px solid rgba(26,111,255,0.4);border-radius:10px;pointer-events:none;left:0;top:28px;width:50vw;height:calc(100vh - 28px)';
      OS.dragState.snapTarget = 'left';
    } else if (e.clientX > window.innerWidth - 8) {
      snapEl.style.cssText = 'display:block;position:fixed;z-index:95;background:rgba(26,111,255,0.1);border:2px solid rgba(26,111,255,0.4);border-radius:10px;pointer-events:none;left:50vw;top:28px;width:50vw;height:calc(100vh - 28px)';
      OS.dragState.snapTarget = 'right';
    } else {
      snapEl.style.display = 'none';
      OS.dragState.snapTarget = null;
    }
  },
  stopDrag() {
    if (OS.dragState && OS.dragState.snapTarget) {
      const { id, snapTarget } = OS.dragState;
      const snapEl = document.getElementById('snap-preview');
      if (snapEl) snapEl.style.display = 'none';
      if (OS.windows[id]) {
        const el = OS.windows[id].el;
        const win = OS.windows[id];
        win.prevW = el.offsetWidth; win.prevH = el.offsetHeight;
        win.prevX = parseFloat(el.style.left); win.prevY = parseFloat(el.style.top);
        if (snapTarget === 'maximize') {
          gsap.to(el, { left: 0, top: 28, width: window.innerWidth, height: window.innerHeight - 28, duration: 0.25, ease: 'power2.out' });
          win.maximized = true;
        } else if (snapTarget === 'left') {
          gsap.to(el, { left: 0, top: 28, width: window.innerWidth / 2, height: window.innerHeight - 28, duration: 0.25, ease: 'power2.out' });
        } else if (snapTarget === 'right') {
          gsap.to(el, { left: window.innerWidth / 2, top: 28, width: window.innerWidth / 2, height: window.innerHeight - 28, duration: 0.25, ease: 'power2.out' });
        }
      }
    } else {
      const snapEl = document.getElementById('snap-preview');
      if (snapEl) snapEl.style.display = 'none';
    }
    OS.dragState = null;
  },
  startResize(e, id) {
    if (window.innerWidth < 768) return;
    e.preventDefault();
    const el = OS.windows[id].el;
    OS.resizeState = { id, startW: el.offsetWidth, startH: el.offsetHeight, startX: e.clientX, startY: e.clientY };
  },
  onResize(e) {
    if (!OS.resizeState) return;
    const { id, startW, startH, startX, startY } = OS.resizeState;
    if (!OS.windows[id]) return;
    const el = OS.windows[id].el;
    const opts = OS.windows[id].opts;
    const minW = opts.minW || 400;
    const minH = opts.minH || 280;
    el.style.width = Math.max(minW, startW + (e.clientX - startX)) + 'px';
    el.style.height = Math.max(minH, startH + (e.clientY - startY)) + 'px';
  },
  stopResize() { OS.resizeState = null; }
};

document.addEventListener('mousemove', (e) => { WM.onDrag(e); WM.onResize(e); Cursor.update(e); });
document.addEventListener('mouseup', () => { WM.stopDrag(); WM.stopResize(); });

// ─── 4. DOCK ────────────────────────────────────────────────────
const Dock = {
  init() {
    const dock = document.getElementById('dock');
    dock.innerHTML = '';
    DOCK_APPS.forEach(app => {
      if (!app) {
        const sep = document.createElement('div');
        sep.className = 'dock-separator';
        dock.appendChild(sep);
        return;
      }
      const item = document.createElement('div');
      item.className = 'dock-item';
      item.dataset.app = app.id;
      item.setAttribute('aria-label', app.label);
      item.innerHTML = `
        ${ICONS[app.id] || ''}
        <div class="dock-item-tooltip">${app.label}</div>
        <div class="dock-active-dot" id="dot-${app.id}"></div>
      `;
      item.addEventListener('click', () => {
        this.bounce(app.id);
        if (OS.windows[app.id]) {
          if (OS.windows[app.id].minimized) WM.restore(app.id);
          else WM.focus(app.id);
        } else {
          Desktop.openApp(app.id);
        }
      });
      dock.appendChild(item);
    });
    dock.addEventListener('mousemove', (e) => this.updateMagnification(e.clientX));
    dock.addEventListener('mouseleave', () => this.updateMagnification(null));
  },
  bounce(id) {
    const item = document.querySelector(`.dock-item[data-app="${id}"]`);
    if (!item) return;
    gsap.to(item, { y: -18, duration: 0.2, ease: 'power2.out', onComplete: () => gsap.to(item, { y: 0, duration: 0.2, ease: 'power2.in' }) });
  },
  setActive(id, bool) {
    const dot = document.getElementById('dot-' + id);
    if (dot) dot.classList.toggle('visible', bool);
  },
  updateMagnification(mouseX) {
    if (window.innerWidth < 768) return;
    document.querySelectorAll('.dock-item').forEach(item => {
      if (mouseX === null) { item.style.transform = 'scale(1)'; return; }
      const rect = item.getBoundingClientRect();
      const center = rect.left + rect.width / 2;
      const dist = Math.abs(mouseX - center);
      let scale = 1;
      if (dist < 40) scale = 1.7;
      else if (dist < 80) scale = 1.35;
      else if (dist < 120) scale = 1.15;
      item.style.transform = `scale(${scale})`;
    });
  }
};

      container.appendChild(icon);
    });
    document.getElementById('desktop').addEventListener('click', () => this.deselectAll());
  },
  selectIcon(id) {
    this.deselectAll();
    const el = document.getElementById('dicon-' + id);
    if (el) { el.classList.add('selected'); this.selected = id; }

  deselectAll() {
    document.querySelectorAll('.desktop-icon.selected').forEach(el => el.classList.remove('selected'));

      experience: () => AppExperience.render(),

      if (!list) return;
      const icons = {

        WatchEvent:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--os-amber)" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
        DeleteEvent: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--os-red)" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>`,

      };
      const relTime = (d) => {
        const s = Math.floor((Date.now() - new Date(d)) / 1000);
        if (s < 60) return 'just now';
        if (s < 3600) return Math.floor(s/60) + ' min ago';
        if (s < 86400) return Math.floor(s/3600) + ' hours ago';
        return Math.floor(s/86400) + ' days ago';
      };
      list.innerHTML = '';
      events.slice(0, 10).forEach(ev => {
        const icon = icons[ev.type] || icons['PushEvent'];
        const repo = ev.repo ? String(ev.repo.name) : 'unknown/repo';
        const time = relTime(ev.created_at);
        const row = document.createElement('div');
        row.className = 'activity-row';
        const iconSpan = document.createElement('span');
        iconSpan.className = 'activity-icon';
        iconSpan.innerHTML = icon; // trusted: hardcoded SVG strings above
        const repoSpan = document.createElement('span');
        repoSpan.className = 'activity-repo';
        repoSpan.textContent = repo; // SAFE: textContent, never innerHTML with API data
        const timeSpan = document.createElement('span');
        timeSpan.className = 'activity-time';
        timeSpan.textContent = time; // SAFE: computed string, no user input
        row.appendChild(iconSpan);
        row.appendChild(repoSpan);
        row.appendChild(timeSpan);
        list.appendChild(row);
      });
      if (fromCache) {
        const note = document.createElement('div');
        note.style.cssText = 'font-size:0.7rem;color:var(--os-text-3);margin-top:8px';
        note.textContent = 'Showing cached data.';
        list.appendChild(note);
      }
    };
    // Try cache first
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (cached && Date.now() - cached.ts < TTL) {
        renderActivity(cached.data, true);
        return;
      }
    } catch(e) { /* invalid cache */ }
    // Live fetch
    fetch('https://api.github.com/users/Mananshah237/events?per_page=10')
      .then(r => {
        const remaining = r.headers.get('X-RateLimit-Remaining');
        if (remaining !== null) {
          const rlEl = document.getElementById('activity-rate-limit');
          if (rlEl) rlEl.textContent = `API: ${remaining} req left`;
        }
        return r.json();
      })
      .then(data => {
        if (Array.isArray(data)) {
          try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
          renderActivity(data, false);
        }
      })
      .catch(() => {
        const list = document.getElementById('activity-list');
        if (list) {
          try {
            const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
            if (cached) { renderActivity(cached.data, true); return; }
          } catch(e) {}
          list.innerHTML = '<div style="color:var(--os-text-3);font-size:0.85rem">Could not reach GitHub. Showing cached data.</div>';
        }
      });
  },
  fetchGitHubProfile() {
    const CACHE_KEY = 'aegis-profile-cache';
    const TTL = 10 * 60 * 1000;
    const applyLiveBadge = (data) => {
      const badge = document.getElementById('stats-live-badge');
      if (badge) badge.style.display = 'inline-flex';
      // Update stats with real data if available

      if (cached && Date.now() - cached.ts < TTL) { applyLiveBadge(cached.data); return; }
    } catch(e) {}
    fetch('https://api.github.com/users/Mananshah237')
      .then(r => r.json())
      .then(data => {
        if (data && data.login) {
          try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
          applyLiveBadge(data);
        }
      })
      .catch(() => {});
  }
};

const AppTerminal = {
  render() {
    const content = `
      <div style="display:flex;flex-direction:column;height:100%">
        <div id="term-output"></div>
        <div id="term-input-row">
          <span class="term-prompt">❯</span>
          <input id="term-input" type="text" autocomplete="off" spellcheck="false" aria-label="Terminal input" maxlength="256">
        </div>
      </div>`;
    WM.create('terminal', {
      title: 'Terminal — manan@aegis', width: 680, height: 440, minW: 400, minH: 280,
      content,
      onOpen: () => this.onOpen()
    });
  },
  onOpen() {
    const input = document.getElementById('term-input');
    if (!input) return;
    this.addHTML('ManOS Terminal v2.0 — type <span style="color:var(--os-accent)">help</span> for commands', 't-dim');
    this.addLine('', 't-out');
    input.focus();
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        // Cap input length to prevent memory exhaustion
        const raw = input.value.trim().slice(0, 256);
        const cmd = raw;
        if (cmd) {
          // Keep history bounded at 50 entries
          OS.cmdHistory.unshift(cmd);
          if (OS.cmdHistory.length > 50) OS.cmdHistory.pop();
          OS.historyIdx = -1;
          this.addLine('\u276F ' + cmd, 't-cmd'); // textContent — safe, user input never parsed as HTML
          input.value = '';
          this.handleInput(cmd);
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (OS.historyIdx < OS.cmdHistory.length - 1) {
          OS.historyIdx++;
          input.value = OS.cmdHistory[OS.historyIdx] || '';
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (OS.historyIdx > 0) {
          OS.historyIdx--;
          input.value = OS.cmdHistory[OS.historyIdx] || '';
        } else {
          OS.historyIdx = -1;
          input.value = '';
        }
      } else if (e.key === 'Tab') {
        e.preventDefault();
        const partial = input.value.trim().toLowerCase();
        if (!partial) return;
        const cmds = ['help','whoami','ls','cat','ping','curl','sudo','clear','history','uname','uptime','pwd','exit'];
        const matches = cmds.filter(c => c.startsWith(partial));
        if (matches.length === 1) input.value = matches[0];
        else if (matches.length > 1) this.addLine(matches.join('  '), 't-dim');
      }
    });
  },
  // Safe: always uses textContent — never renders HTML from user input
  addLine(text, cls) {
    const out = document.getElementById('term-output');
    if (!out) return;
    const div = document.createElement('div');
    div.className = cls || 't-out';
    div.textContent = text;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
  },
  // Trusted only: uses innerHTML — ONLY call with hardcoded strings, never user input
  addHTML(html, cls) {
    const out = document.getElementById('term-output');
    if (!out) return;
    const div = document.createElement('div');
    div.className = cls || 't-out';
    div.innerHTML = html;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
  },
  typeOutput(lines, cls, delay) {
    let i = 0;
    const next = () => {
      if (i >= lines.length) return;
      const line = lines[i++];
      const out = document.getElementById('term-output');
      if (!out) return;
      const div = document.createElement('div');
      div.className = cls || 't-out';
      out.appendChild(div);
      out.scrollTop = out.scrollHeight;
      let j = 0;
      const type = () => {
        div.textContent = line.slice(0, ++j);
        out.scrollTop = out.scrollHeight;
        if (j < line.length) setTimeout(type, 18);
        else setTimeout(next, delay || 60);
      };
      setTimeout(type, 18);
    };
    next();
  },
  handleInput(rawCmd) {
    const cmd = rawCmd.trim();
    const parts = cmd.split(/\s+/);

// ─── 8. WALLPAPER ───────────────────────────────────────────────
const Wallpaper = {
  renderer: null, scene: null, camera: null, raf: null,
  mouseX: 0, mouseY: 0, camX: 0, camY: 0,
  particles: [], forms: [],

  init() {
    if (typeof THREE === 'undefined') return;
    const canvas = document.getElementById('canvas-bg');
    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
    this.renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setClearColor(0x050D1A, 1);

    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    this.camera.position.set(0, 0, 30);

    // 150 particle spheres
    const particleMat = new THREE.MeshBasicMaterial({ color: 0x1A6FFF, transparent: true, opacity: 0.5 });
    for (let i = 0; i < 150; i++) {
      const geo = new THREE.SphereGeometry(0.06, 4, 4);
      const mesh = new THREE.Mesh(geo, particleMat.clone());
      mesh.position.set(
        (Math.random() - 0.5) * 60,
        (Math.random() - 0.5) * 40,
        (Math.random() - 0.5) * 30
      );
      this.scene.add(mesh);
      this.particles.push(mesh);
    }

    // 80 connecting lines between close particles
    const lineMat = new THREE.LineBasicMaterial({ color: 0x1A6FFF, transparent: true, opacity: 0.06 });
    let lineCount = 0;
    for (let i = 0; i < this.particles.length && lineCount < 80; i++) {
      for (let j = i + 1; j < this.particles.length && lineCount < 80; j++) {
        const dist = this.particles[i].position.distanceTo(this.particles[j].position);
        if (dist < 12) {
          const geo = new THREE.BufferGeometry().setFromPoints([
            this.particles[i].position.clone(),
            this.particles[j].position.clone()
          ]);
          this.scene.add(new THREE.Line(geo, lineMat.clone()));
          lineCount++;
        }
      }
    }

    // 3 floating IcosahedronGeometry wireframe forms
    const formPositions = [[-12, 6, -10], [10, -8, -15], [0, 12, -20]];
    const formSpeeds = [{ rx: 0.0003, ry: 0.0002 }, { rx: 0.0002, ry: 0.00025 }, { rx: 0.00025, ry: 0.0003 }];
    formPositions.forEach((pos, i) => {
      const geo = new THREE.IcosahedronGeometry(4, 0);
      const mat = new THREE.MeshBasicMaterial({ color: 0x1A3060, wireframe: true, transparent: true, opacity: 0.12 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(...pos);
      mesh.userData.speed = formSpeeds[i];
      this.scene.add(mesh);
      this.forms.push(mesh);
    });

    window.addEventListener('mousemove', (e) => {
      this.mouseX = (e.clientX / window.innerWidth - 0.5) * 8;
      this.mouseY = -(e.clientY / window.innerHeight - 0.5) * 6;
    });

    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) this.pause(); else this.resume();
    });

    this.animate();
  },

  animate() {
    this.raf = requestAnimationFrame(() => this.animate());
    // Mouse parallax: lerp camera toward mouse
    this.camX += (this.mouseX - this.camX) * 0.02;
    this.camY += (this.mouseY - this.camY) * 0.02;
    this.camera.position.x = this.camX;
    this.camera.position.y = this.camY;

    // Rotate floating forms
    this.forms.forEach(f => {
      f.rotation.x += f.userData.speed.rx;
      f.rotation.y += f.userData.speed.ry;
    });

    this.renderer.render(this.scene, this.camera);
  },

  pause() {
    if (this.raf) { cancelAnimationFrame(this.raf); this.raf = null; }
  },

  resume() {
    if (!this.raf) this.animate();
  }
};

    const overlay = document.getElementById('network-overlay');
    Wallpaper.pause();
    gsap.to(['#menubar','#dock','#desktop-icons'], { opacity: 0, duration: 0.5 });
    document.querySelectorAll('.window').forEach(w => gsap.to(w, { opacity: 0, scale: 0.95, duration: 0.4 }));
    overlay.style.pointerEvents = 'all';
    gsap.to(overlay, { opacity: 1, duration: 0.7, ease: 'power2.inOut', onComplete: () => {
      document.getElementById('net-hud').style.opacity = '1';
      document.getElementById('net-exit').style.opacity = '1';
    }});
    this.initScene();
    this.scanInterval = setInterval(() => this.triggerScan(), 8000);
    setTimeout(() => this.triggerScan(), 1500);
    const canvas = document.getElementById('network-canvas');
    canvas.addEventListener('mousemove', this._onMouseMove = e => this.onMouseMove(e));
    canvas.addEventListener('click',     this._onClick     = e => this.onClick(e));
    canvas.addEventListener('wheel', this._onWheel = e => {
      e.preventDefault();
      this.cameraTarget.z = Math.max(22, Math.min(130, this.cameraTarget.z + e.deltaY * 0.07));
    }, { passive: false });
    document.getElementById('net-exit').addEventListener('click',        this._onExit  = () => this.exit());
    document.getElementById('net-panel-close').addEventListener('click', this._onClose = () => this.closePanel());
    this._onKey = e => {
      if (e.key === 'Escape') { if (this.focusedNode) this.closePanel(); else this.exit(); }
    };
    document.addEventListener('keydown', this._onKey);
    window.addEventListener('resize', this._onResize = () => {
      if (!this.active || !this.renderer) return;
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });
  },

  exit() {
    this.active = false;
    Dock.setActive('network', false);
    clearInterval(this.scanInterval);
    if (this.animFrameId) cancelAnimationFrame(this.animFrameId);
    const panel = document.getElementById('net-panel');
    panel.style.opacity = '0'; panel.style.pointerEvents = 'none';
    document.getElementById('net-hud').style.opacity = '0';
    document.getElementById('net-exit').style.opacity = '0';
    gsap.to('#network-overlay', { opacity: 0, duration: 0.6, ease: 'power2.inOut', onComplete: () => {
      document.getElementById('network-overlay').style.pointerEvents = 'none';
      if (this.renderer) { this.renderer.dispose(); this.renderer = null; }
      this.scene = null; this.nodes = []; this.edges = []; this.dynamicEdges = []; this.particles = [];
      this.focusedNode = null; this.hoveredNode = null; this.gsapFlying = false;
      this.starfieldGroup = null;
    }});
    gsap.to(['#menubar','#dock','#desktop-icons'], { opacity: 1, duration: 0.5 });
    document.querySelectorAll('.window').forEach(w => gsap.to(w, { opacity: 1, scale: 1, duration: 0.5 }));
    Wallpaper.resume();
    const canvas = document.getElementById('network-canvas');
    if (canvas) {
      canvas.removeEventListener('mousemove', this._onMouseMove);
      canvas.removeEventListener('click', this._onClick);
      canvas.removeEventListener('wheel', this._onWheel);
    }
    document.removeEventListener('keydown', this._onKey);
    window.removeEventListener('resize', this._onResize);
    document.body.style.cursor = 'none';
  },

  initScene() {
    if (typeof THREE === 'undefined') return;
    const W = window.innerWidth, H = window.innerHeight;
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(65, W/H, 0.1, 800);
    this.camera.position.set(0, 0, 85);
    this.cameraTarget = { x:0, y:0, z:85 };
    this.cameraActual = { x:0, y:0, z:85 };
    this.renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('network-canvas'),
      antialias: true, alpha: true
    });
    this.renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
    this.renderer.setSize(W, H);
    this.renderer.setClearColor(0x000508, 1);
    this.scene.add(new THREE.AmbientLight(0x1A2840, 3.5));
    const centerLight = new THREE.PointLight(0x1A6FFF, 5, 150);
    centerLight.position.set(0, 0, 10);
    this.scene.add(centerLight);
    const rimLight = new THREE.PointLight(0x00E87A, 2, 100);
    rimLight.position.set(-30, 20, -10);
    this.scene.add(rimLight);
    const fillLight = new THREE.PointLight(0xFFB800, 1.5, 100);
    fillLight.position.set(20, -20, 5);
    this.scene.add(fillLight);
    const backLight = new THREE.PointLight(0xB44FFF, 1.2, 90);
    backLight.position.set(-15, 10, -20);
    this.scene.add(backLight);
    this.buildStarfield();
    this.buildNebula();
    this.buildGrid();
    this.buildNodes();
    this.buildEdges();
    this.buildParticles();
    this.buildScanRing();
    this.animate();
  },

  buildStarfield() {
    const geo = new THREE.BufferGeometry();
    const count = 600;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      positions[i*3]   = (Math.random() - 0.5) * 400;
      positions[i*3+1] = (Math.random() - 0.5) * 300;
      positions[i*3+2] = (Math.random() - 0.5) * 200 - 50;
      const brightness = 0.3 + Math.random() * 0.7;
      const hue = Math.random();
      if (hue < 0.6) { colors[i*3]=brightness*0.7; colors[i*3+1]=brightness*0.8; colors[i*3+2]=brightness; }
      else if (hue < 0.8) { colors[i*3]=brightness; colors[i*3+1]=brightness*0.85; colors[i*3+2]=brightness*0.7; }
      else { colors[i*3]=brightness; colors[i*3+1]=brightness*0.5; colors[i*3+2]=brightness*0.5; }
    }
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.PointsMaterial({ size: 0.28, vertexColors: true, transparent: true, opacity: 0.8 });
    this.starfieldGroup = new THREE.Group();
    this.starfieldGroup.add(new THREE.Points(geo, mat));
    this.scene.add(this.starfieldGroup);
  },

  buildNebula() {
    const nebulaData = [
      { x:0,   y:0,   z:-80, color:0x1A6FFF, size:90, opacity:0.04 },
      { x:30,  y:10,  z:-60, color:0x00C2FF, size:60, opacity:0.05 },
      { x:-25, y:-10, z:-70, color:0x00E87A, size:70, opacity:0.04 },
      { x:10,  y:25,  z:-50, color:0xFF3B5C, size:45, opacity:0.035 },
      { x:-15, y:5,   z:-90, color:0xB44FFF, size:80, opacity:0.04 },
    ];
    nebulaData.forEach(d => {
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      const rgb = this._hexToRgb(d.color);
      const g = ctx.createRadialGradient(128,128,0,128,128,128);
      g.addColorStop(0,   `rgba(${rgb.r},${rgb.g},${rgb.b},0.9)`);
      g.addColorStop(0.5, `rgba(${rgb.r},${rgb.g},${rgb.b},0.4)`);
      g.addColorStop(1,   `rgba(0,0,0,0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0,0,256,256);
      const tex = new THREE.CanvasTexture(c);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: d.opacity, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.position.set(d.x, d.y, d.z);
      sprite.scale.set(d.size, d.size, 1);
      this.scene.add(sprite);
    });
  },

  buildGrid() {
    const geo = new THREE.BufferGeometry();
    const lines = [];
    const size = 80, step = 10;
    for (let i = -size; i <= size; i += step) {
      lines.push(-size, -28, i,  size, -28, i);
      lines.push(i, -28, -size,  i, -28, size);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(lines), 3));
    const mat = new THREE.LineBasicMaterial({ color: 0x0A1A30, transparent: true, opacity: 0.4 });
    this.scene.add(new THREE.LineSegments(geo, mat));
  },

  _hexToRgb(hex) {
    return { r:(hex>>16)&255, g:(hex>>8)&255, b:hex&255 };
  },

  _makeGlowSprite(color, scaleMult) {
    const rgb = this._hexToRgb(color);
    const c = document.createElement('canvas');
    c.width = c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64,64,0,64,64,64);
    g.addColorStop(0,   `rgba(${rgb.r},${rgb.g},${rgb.b},0.6)`);
    g.addColorStop(0.3, `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`);
    g.addColorStop(0.7, `rgba(${rgb.r},${rgb.g},${rgb.b},0.07)`);
    g.addColorStop(1,   `rgba(0,0,0,0)`);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,128,128);
    const mat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false });
    const s = new THREE.Sprite(mat);
    s.scale.set(scaleMult, scaleMult, 1);
    return s;
  },

  _makeLabelSprite(text, color) {
    const rgb = this._hexToRgb(color);
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 128; // 2× resolution for sharp rendering
    const ctx = c.getContext('2d');
    // Solid opaque dark background — no bleed-through, no blur
    ctx.fillStyle = 'rgba(3,8,18,0.92)';
    ctx.fillRect(40, 22, 944, 84);
    // Colored left accent bar
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},1)`;
    ctx.fillRect(40, 22, 5, 84);
    // Sharp text — zero shadowBlur so it stays crisp
    ctx.font = 'bold 38px "JetBrains Mono", monospace';
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},1)`;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 0;
    ctx.fillText(text.toUpperCase(), 512, 76);
    const mat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false });
    const s = new THREE.Sprite(mat);
    s.scale.set(16, 3.2, 1);
    return s;
  },

  buildNodes() {
    this.nodes = [];
    ALL_NODE_DEFS.forEach(def => {
      const isSubnode = !!def.parent;
      let mesh;
      if (def.geometry === 'cluster' || isSubnode) {
        if (def.geometry === 'cluster') {
          mesh = new THREE.Group();
          const offsets = [[-1.0,1.0,0],[1.0,1.0,0],[-1.0,-1.0,0],[1.0,-1.0,0]];
          const smat = new THREE.MeshStandardMaterial({ color:def.color, emissive:def.emissive||0x111111, emissiveIntensity:0.6, metalness:0.3, roughness:0.4, transparent:true, opacity:0.92 });
          offsets.forEach(o => {
            const sm = new THREE.Mesh(new THREE.SphereGeometry(def.scale*0.38, 20, 20), smat.clone());
            sm.position.set(...o);
            mesh.add(sm);
          });
        } else {
          const geo = new THREE.SphereGeometry(def.scale, 28, 28);
          const mat = new THREE.MeshStandardMaterial({ color:def.color, emissive:def.emissive||def.color, emissiveIntensity:0.9, metalness:0.3, roughness:0.4, transparent:true, opacity:0.95 });
          mesh = new THREE.Mesh(geo, mat);
        }
      } else {
        let geo;
        if (def.geometry === 'sphere')      geo = new THREE.SphereGeometry(def.scale, 36, 36);
        else if (def.geometry === 'icosahedron') geo = new THREE.IcosahedronGeometry(def.scale, 1);
        else if (def.geometry === 'torus')   geo = new THREE.TorusGeometry(def.scale, def.scale*0.18, 18, 80);
        else if (def.geometry === 'octahedron') geo = new THREE.OctahedronGeometry(def.scale);
        else geo = new THREE.BoxGeometry(def.scale, def.scale, def.scale);
        const mat = new THREE.MeshStandardMaterial({ color:def.color, emissive:def.emissive, emissiveIntensity:0.6, metalness:0.3, roughness:0.4, transparent:true, opacity:0.92 });
        mesh = new THREE.Mesh(geo, mat);
      }
      mesh.position.set(def.position.x, def.position.y, def.position.z);
      this.scene.add(mesh);

      const glowSize = isSubnode ? def.scale * 22 : def.scale * 18;
      const glow = this._makeGlowSprite(def.color, glowSize);
      glow.position.set(def.position.x, def.position.y, def.position.z);
      this.scene.add(glow);

      const labelSprite = this._makeLabelSprite(def.label, def.color);
      const labelY = def.position.y + def.scale + (isSubnode ? 2.8 : 3.2);
      labelSprite.position.set(def.position.x, labelY, def.position.z);
      this.scene.add(labelSprite);

      // Invisible hit sphere — 2x radius so clicking is forgiving
      const hitRadius = isSubnode ? def.scale * 2.5 : def.scale * 1.7;
      const hitGeo = new THREE.SphereGeometry(hitRadius, 8, 8);
      const hitMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false });
      const hitMesh = new THREE.Mesh(hitGeo, hitMat);
      hitMesh.position.copy(mesh.position);
      this.scene.add(hitMesh);

      const nodeObj = {
        def, mesh, glow, labelSprite, hitMesh,
        baseY: def.position.y,
        t: Math.random() * Math.PI * 2,
        originalScale: (def.geometry === 'cluster') ? 1 : mesh.scale.x,
        isSubnode,
      };
      if (isSubnode) {
        const par = NODE_DEFS.find(n => n.id === def.parent);
        nodeObj.currentAngle = def.orbitAngle;
        nodeObj.orbitSpeed = def.orbitSpeed * 0.3;
        nodeObj.orbitRadius = def.orbitRadius;
        nodeObj.orbitTilt = def.orbitTilt;
        nodeObj.parentPos = par ? par.position : {x:0,y:0,z:0};
        nodeObj.floatSpeed = 0.28 + Math.random() * 0.18;
      }
      this.nodes.push(nodeObj);
    });
  },

  buildEdges() {
    this.edges = [];
    this.dynamicEdges = [];

    // Static main-to-main edges — thick curved tubes, visible bright color
    const mainPairs = new Set();
    NODE_DEFS.forEach(n => n.connectedTo.forEach(t => {
      if (NODE_DEFS.find(m => m.id === t)) mainPairs.add([n.id, t].sort().join('|'));
    }));
    mainPairs.forEach(pair => {
      const [idA, idB] = pair.split('|');
      const dA = NODE_DEFS.find(n => n.id === idA), dB = NODE_DEFS.find(n => n.id === idB);
      if (!dA || !dB) return;
      const posA = new THREE.Vector3(dA.position.x, dA.position.y, dA.position.z);
      const posB = new THREE.Vector3(dB.position.x, dB.position.y, dB.position.z);
      const mid = posA.clone().add(posB).multiplyScalar(0.5);
      mid.x += (Math.random()-0.5)*8; mid.y += (Math.random()-0.5)*8;
      const curve = new THREE.QuadraticBezierCurve3(posA, mid, posB);
      const tubeGeo = new THREE.TubeGeometry(curve, 28, 0.09, 8, false);
      const tubeMat = new THREE.MeshBasicMaterial({ color: 0x3A7FDD, transparent: true, opacity: 0.55 });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      this.scene.add(tube);
      this.edges.push({ mesh: tube, curve, isSubEdge: false });
    });

    // Dynamic subnode→parent edges — Lines updated every frame
    SUBNODE_DEFS.forEach(def => {
      const nodeA = this.nodes.find(n => n.def.id === def.id);
      const nodeB = this.nodes.find(n => n.def.id === def.parent);
      if (!nodeA || !nodeB) return;
      const positions = new Float32Array(6);
      const pA = nodeA.mesh.position, pB = nodeB.mesh.position;
      positions[0]=pA.x; positions[1]=pA.y; positions[2]=pA.z;
      positions[3]=pB.x; positions[4]=pB.y; positions[5]=pB.z;
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.LineBasicMaterial({ color: def.color, transparent: true, opacity: 0.65 });
      const line = new THREE.Line(geo, mat);
      this.scene.add(line);
      this.dynamicEdges.push({ line, nodeA, nodeB, positions });
      this.edges.push({ mesh: line, isSubEdge: true });
    });
  },

  buildParticles() {
    this.particles = [];
    this.edges.filter(e => !e.isSubEdge && e.curve).forEach(edge => {
      const count = 5 + Math.floor(Math.random()*4);
      for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.09, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00C2FF, transparent: true, opacity: 0.9 });
        const mesh = new THREE.Mesh(geo, mat);
        this.scene.add(mesh);
        this.particles.push({ mesh, edge, t: Math.random(), speed: 0.0008 + Math.random()*0.0012 });
      }
    });
  },

  buildScanRing() {
    const geo = new THREE.RingGeometry(0, 0.5, 80);
    const mat = new THREE.MeshBasicMaterial({ color: 0x1A6FFF, transparent: true, opacity: 0, side: THREE.DoubleSide });
    this.scanRing = new THREE.Mesh(geo, mat);
    this.scanRing.rotation.x = -Math.PI / 2;
    this.scene.add(this.scanRing);
  },

  triggerScan() {
    if (!this.scanRing) return;
    const ring = this.scanRing;
    ring.scale.set(0.1, 0.1, 0.1);
    ring.material.opacity = 0.7;
    ring.material.color.setHex(Math.random() > 0.5 ? 0x1A6FFF : 0x00E87A);
    gsap.to(ring.scale, { x: 90, y: 90, z: 90, duration: 3.5, ease: 'power2.out' });
    gsap.to(ring.material, { opacity: 0, duration: 3.5, ease: 'power2.out' });
  },

  animate() {
    this.animFrameId = requestAnimationFrame(() => this.animate());
    this.t = performance.now() * 0.001;
    // Rotate starfield slowly
    if (this.starfieldGroup) {
      this.starfieldGroup.rotation.y += 0.00008;
      this.starfieldGroup.rotation.x += 0.00003;
    }
    // Pulse + animate nodes
    this.nodes.forEach(n => {
      n.t += 0.016 * (n.def.pulseSpeed || 1.0);
      const pulse = 1 + Math.sin(n.t) * (n.isSubnode ? 0.06 : 0.07);
      if (n.def.geometry !== 'cluster') {
        n.mesh.scale.setScalar(n.originalScale * pulse);
        if (n.mesh.material) n.mesh.material.emissiveIntensity = (n.isSubnode ? 0.7 : 0.5) + Math.sin(n.t) * 0.3;
      }
      // Geometry-specific rotation — main nodes
      if (!n.isSubnode) {
        if (n.def.geometry === 'icosahedron') n.mesh.rotation.y += 0.005;
        if (n.def.geometry === 'torus')  { n.mesh.rotation.x += 0.004; n.mesh.rotation.z += 0.003; }
        if (n.def.geometry === 'octahedron') n.mesh.rotation.y -= 0.004;
        if (n.def.geometry === 'box')    n.mesh.rotation.y += 0.006;
        if (n.def.geometry === 'cluster') n.mesh.rotation.y += 0.003;
        // Float on Y — main nodes only
        const newY = n.def.position.y + Math.sin(this.t * 0.4 + n.t) * 0.4;
        n.mesh.position.y = newY;
        if (n.glow) n.glow.position.y = newY;
        if (n.labelSprite) n.labelSprite.position.y = newY + n.def.scale + 3.2;
        if (n.hitMesh) n.hitMesh.position.y = newY;
      } else {
        // Subnodes spin slowly
        n.mesh.rotation.y += 0.008;
      }
    });
    // Orbit subnodes around their parent nodes
    this.nodes.filter(n => n.isSubnode).forEach(n => {
      n.currentAngle += n.orbitSpeed * 0.016;
      const a = n.currentAngle;
      const par = n.parentPos;
      const x = par.x + Math.cos(a) * n.orbitRadius;
      const y = par.y + Math.sin(a * n.orbitTilt) * n.orbitRadius * 0.4 + Math.sin(this.t * n.floatSpeed + n.t) * 0.22;
      const z = par.z + Math.sin(a) * n.orbitRadius * 0.6;
      n.mesh.position.set(x, y, z);
      if (n.glow) n.glow.position.set(x, y, z);
      if (n.labelSprite) n.labelSprite.position.set(x, y + n.def.scale + 2.8, z);
      if (n.hitMesh) n.hitMesh.position.set(x, y, z);
    });
    // Update dynamic subnode edges each frame
    this.dynamicEdges.forEach(e => {
      const a = e.nodeA.mesh.position, b = e.nodeB.mesh.position;
      e.positions[0]=a.x; e.positions[1]=a.y; e.positions[2]=a.z;
      e.positions[3]=b.x; e.positions[4]=b.y; e.positions[5]=b.z;
      e.line.geometry.attributes.position.needsUpdate = true;
    });
    // Advance particles
    this.particles.forEach(p => {
      p.t += p.speed;
      if (p.t > 1) p.t = 0;
      const pos = p.edge.curve.getPoint(p.t);
      p.mesh.position.copy(pos);
      p.mesh.material.opacity = 0.85 * Math.sin(p.t * Math.PI);
    });
    // Camera lerp
    if (!this.gsapFlying) {
      this.cameraActual.x += (this.cameraTarget.x - this.cameraActual.x) * 0.025;
      this.cameraActual.y += (this.cameraTarget.y - this.cameraActual.y) * 0.025;
      this.cameraActual.z += (this.cameraTarget.z - this.cameraActual.z) * 0.08;
      if (!this.focusedNode) {
        this.camera.position.x = this.cameraActual.x + this.mouseNDC.x * 4;
        this.camera.position.y = this.cameraActual.y + this.mouseNDC.y * 3;
      }
      this.camera.position.z = this.cameraActual.z;
    }
    const lookTarget = new THREE.Vector3(0, 0, 0);
    if (this.focusedNode) lookTarget.copy(this.focusedNode.mesh.position);
    this.camera.lookAt(lookTarget);
    this.renderer.render(this.scene, this.camera);
  },

  onMouseMove(e) {
    this.mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
    this.mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(this.mouseNDC, this.camera);
    const hitTargets = this.nodes.map(n => n.hitMesh || n.mesh);
    const hits = raycaster.intersectObjects(hitTargets, true);
    const prevHovered = this.hoveredNode;
    if (hits.length > 0) {
      const hitObj = hits[0].object;
      this.hoveredNode = this.nodes.find(n => n.hitMesh === hitObj || n.mesh === hitObj || (n.mesh.children && n.mesh.children.includes(hitObj))) || null;
    } else {
      this.hoveredNode = null;
    }
    if (this.hoveredNode !== prevHovered) {
      document.body.style.cursor = this.hoveredNode ? 'pointer' : 'none';
      document.getElementById('net-node-label').textContent = this.hoveredNode ? this.hoveredNode.def.label : '';
      if (prevHovered && !this.gsapFlying) {
        gsap.to(prevHovered.mesh.scale, { x: prevHovered.originalScale, y: prevHovered.originalScale, z: prevHovered.originalScale, duration: 0.2 });
        if (prevHovered.glow) gsap.to(prevHovered.glow.material, { opacity: prevHovered.isSubnode ? 0.45 : 0.35, duration: 0.2 });
      }
      if (this.hoveredNode && !this.gsapFlying) {
        const s = this.hoveredNode.originalScale * 1.3;
        gsap.to(this.hoveredNode.mesh.scale, { x: s, y: s, z: s, duration: 0.3, ease: 'back.out(2)' });
        if (this.hoveredNode.glow) gsap.to(this.hoveredNode.glow.material, { opacity: 0.7, duration: 0.2 });
      }
    }
  },

  onClick(e) {
    if (this.hoveredNode) this.flyToNode(this.hoveredNode);
    else if (this.focusedNode) this.closePanel();
  },

  flyToNode(node) {
    this.gsapFlying = true;
    this.focusedNode = node;
    const targetPos = node.mesh.position.clone();
    targetPos.z += node.isSubnode ? 8 : 10;
    this.nodes.forEach(n => {
      if (n !== node) {
        const mat = n.mesh.material || (n.mesh.children[0] && n.mesh.children[0].material);
        if (mat) gsap.to(mat, { opacity: 0.1, duration: 0.6 });
        if (n.glow) gsap.to(n.glow.material, { opacity: 0.06, duration: 0.6 });
        if (n.labelSprite) gsap.to(n.labelSprite.material, { opacity: 0, duration: 0.4 });
      }
    });
    this.edges.forEach(e => gsap.to(e.mesh.material, { opacity: 0.04, duration: 0.6 }));
    this.particles.forEach(p => gsap.to(p.mesh.material, { opacity: 0, duration: 0.4 }));
    gsap.to(this.camera.position, {
      x: targetPos.x, y: targetPos.y, z: targetPos.z,
      duration: 1.6, ease: 'power3.inOut',
      onUpdate: () => { this.camera.lookAt(node.mesh.position); },
      onComplete: () => {
        this.gsapFlying = false;
        const s = node.originalScale * 0.65;
        gsap.to(node.mesh.scale, { x: s, y: s, z: s, duration: 0.4 });
        this.openPanel(node);
      }
    });
    const mat = node.mesh.material || (node.mesh.children[0] && node.mesh.children[0].material);
    if (mat) gsap.to(mat, { emissiveIntensity: 1.8, duration: 0.8 });
  },

  pullBack() {
    this.gsapFlying = true;
    const prevNode = this.focusedNode;
    this.focusedNode = null;
    const panel = document.getElementById('net-panel');
    gsap.to(panel, { opacity: 0, duration: 0.25, ease: 'power2.in', onComplete: () => { panel.style.pointerEvents = 'none'; }});
    if (prevNode) {
      gsap.to(prevNode.mesh.scale, { x: prevNode.originalScale, y: prevNode.originalScale, z: prevNode.originalScale, duration: 0.5 });
      const mat = prevNode.mesh.material || (prevNode.mesh.children[0] && prevNode.mesh.children[0].material);
      if (mat) gsap.to(mat, { emissiveIntensity: 0.6, duration: 0.5 });
    }
    gsap.to(this.camera.position, {
      x: 0, y: 0, z: 85, duration: 1.4, ease: 'power3.inOut',
      onComplete: () => { this.gsapFlying = false; this.cameraActual = { x:0, y:0, z:85 }; }
    });
    setTimeout(() => {
      this.nodes.forEach(n => {
        const mat = n.mesh.material || (n.mesh.children[0] && n.mesh.children[0].material);
        const targetOpacity = n.isSubnode ? 0.95 : 0.92;
        if (mat) gsap.to(mat, { opacity: targetOpacity, duration: 0.6 });
        if (n.glow) gsap.to(n.glow.material, { opacity: n.isSubnode ? 0.45 : 0.35, duration: 0.6 });
        if (n.labelSprite) gsap.to(n.labelSprite.material, { opacity: 1, duration: 0.6 });
      });
      this.edges.forEach(e => gsap.to(e.mesh.material, { opacity: 0.45, duration: 0.6 }));
      this.particles.forEach(p => gsap.to(p.mesh.material, { opacity: 0.8, duration: 0.4 }));
    }, 400);
  },
